<div class="min-h-screen bg-slate-950 flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans">

    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div class="inline-block p-3 rounded-full bg-yellow-400 mb-4 border-4 border-black">
            <span class="text-3xl">🚀</span>
        </div>
        <h2 class="text-4xl font-black text-white tracking-tighter uppercase italic">
            FUTURAMA <span class="text-red-500">SYSTEM</span>
        </h2>
        <p class="mt-2 text-cyan-400 font-mono text-xs tracking-widest uppercase">
            — Propiedad de Planet Express Inc. —
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div
            class="bg-slate-800 py-8 px-6 border-4 border-red-600 sm:rounded-2xl sm:px-10 shadow-[8px_8px_0px_0px_rgba(220,38,38,0.3)]">
            <form (ngSubmit)="iniciarSesion()" class="space-y-6">

                <div>
                    <label for="email" class="block text-xs font-bold text-cyan-300 uppercase tracking-widest">
                        ID de Tripulante (Email)
                    </label>
                    <div class="mt-2">
                        <input id="email" [(ngModel)]="email"  name="email" type="email" required placeholder="philip.fry@planetexpress.com"
                            class="block w-full px-4 py-3 bg-slate-900 border-2 border-slate-700 rounded-none text-white placeholder-slate-500 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 sm:text-sm transition-all">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-xs font-bold text-cyan-300 uppercase tracking-widest">
                        Código de Acceso
                    </label>
                    <div class="mt-2">
                        <input id="password" [(ngModel)]="password" name="password" type="password" required placeholder="••••••••"
                            class="block w-full px-4 py-3 bg-slate-900 border-2 border-slate-700 rounded-none text-white placeholder-slate-500 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 sm:text-sm transition-all">
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="w-full flex justify-center py-4 px-4 border-b-4 border-red-800 rounded-lg text-sm font-black uppercase tracking-tighter text-white bg-red-600 hover:bg-red-500 hover:scale-[1.02] active:border-b-0 active:translate-y-1 transition-all">
                        ¡Despegar! (Ingresar)
                    </button>
                </div>
            </form>

            <div class="mt-6 border-t border-slate-700 pt-6">
                <p class="text-center text-xs text-slate-400">
                    ¿Nuevo en la Tierra?
                    <a href="/register"
                        class="font-bold text-yellow-400 hover:text-white transition-colors uppercase ml-1">
                        Regístrate aquí
                    </a>
                </p>
            </div>
        </div>

        <p class="mt-6 text-center text-[10px] text-slate-600 uppercase font-mono">
            Advertencia: El uso no autorizado será castigado con el envío al sol.
        </p>
    </div>
</div>
