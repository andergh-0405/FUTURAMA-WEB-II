<div class="min-h-screen bg-slate-950 py-12 px-4 sm:px-6 lg:px-8 font-sans">
  <div class="max-w-7xl mx-auto">
    
    <div class="text-center mb-14 border-b-4 border-dashed border-slate-800 pb-8">
      <h2 class="text-5xl font-black text-white italic tracking-tighter uppercase">
        EXPEDIENTES <span class="text-yellow-400 font-mono">FUTURAMA</span>
      </h2>
      <div class="mt-4 inline-block bg-red-600 text-white text-xs font-bold px-4 py-1 uppercase tracking-[0.3em]">
        Total de Especímenes: {{ personaje().length }}
      </div>
    </div>
 
    <div class="grid grid-cols-1 gap-10 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      @for (personaje of personaje(); track personaje.id) {
        <div
          class="group bg-slate-900 border-4 border-slate-700 hover:border-cyan-500 transition-all duration-300 relative overflow-hidden shadow-[10px_10px_0px_0px_rgba(0,0,0,0.5)]"
        >
          

          <div class="relative h-64 bg-slate-800 border-b-4 border-slate-700 overflow-hidden">
            <img
              [src]="personaje.image"
              [alt]="personaje.name"
              class="h-full w-full object-contain p-4 group-hover:scale-110 group-hover:rotate-2 transition-transform duration-500"
            />
            <div class="absolute inset-0 bg-cyan-500/10 opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity"></div>
          </div>
 
          <div class="p-5 flex flex-col bg-slate-900">
            <h3 class="text-2xl font-black text-white uppercase italic tracking-tighter group-hover:text-cyan-400 transition-colors">
              {{ personaje.name }}
            </h3>
            
            <div class="mt-3 flex flex-col gap-1">
              <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Género / Especie</span>
              <p class="text-sm font-mono text-cyan-300 bg-cyan-950/30 px-2 py-1 border border-cyan-900/50">
                > {{ personaje.gender || 'DESCONOCIDO' }}
              </p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
